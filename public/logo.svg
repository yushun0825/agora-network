<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" role="img" aria-label="AGORA">
  <!-- 中央シンボル: 7点を結ぶアゴラ（広場）の幾何 -->
  <g transform="translate(20 30)" fill="none" stroke="#F5F4EE" stroke-width="1.1" stroke-linecap="round">
    <circle cx="0" cy="-14" r="1.6" fill="#F5F4EE" stroke="none"/>
    <circle cx="13.06" cy="-7" r="1.6" fill="#F5F4EE" stroke="none"/>
    <circle cx="13.06" cy="7" r="1.6" fill="#F5F4EE" stroke="none"/>
    <circle cx="0" cy="14" r="1.6" fill="#F5F4EE" stroke="none"/>
    <circle cx="-13.06" cy="7" r="1.6" fill="#F5F4EE" stroke="none"/>
    <circle cx="-13.06" cy="-7" r="1.6" fill="#F5F4EE" stroke="none"/>
    <circle cx="0" cy="0" r="2.6" fill="#B89870" stroke="none"/>
    <line x1="0" y1="-14" x2="0" y2="0" stroke="#F5F4EE" stroke-opacity="0.45"/>
    <line x1="13.06" y1="-7" x2="0" y2="0" stroke="#F5F4EE" stroke-opacity="0.45"/>
    <line x1="13.06" y1="7" x2="0" y2="0" stroke="#F5F4EE" stroke-opacity="0.45"/>
    <line x1="0" y1="14" x2="0" y2="0" stroke="#F5F4EE" stroke-opacity="0.45"/>
    <line x1="-13.06" y1="7" x2="0" y2="0" stroke="#F5F4EE" stroke-opacity="0.45"/>
    <line x1="-13.06" y1="-7" x2="0" y2="0" stroke="#F5F4EE" stroke-opacity="0.45"/>
  </g>
  <!-- ロゴタイプ -->
  <text x="56" y="40"
        font-family="'Cormorant Garamond', 'EB Garamond', Georgia, serif"
        font-size="34" font-weight="500"
        letter-spacing="6"
        fill="#F5F4EE">AGORA</text>
</svg>
