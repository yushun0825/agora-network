<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- 背景 -->
  <rect width="1200" height="630" fill="#1A1F1A"/>
  <!-- アンビエントグロー -->
  <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
    <stop offset="0%" stop-color="#2A3F6F" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#1A1F1A" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- 左側: 中央シンボル -->
  <g transform="translate(280 315)" fill="none" stroke="#F5F4EE" stroke-width="2" stroke-linecap="round">
    <!-- 7つのポイント -->
    <circle cx="0" cy="-130" r="6" fill="#F5F4EE" stroke="none"/>
    <circle cx="121.24" cy="-65" r="6" fill="#F5F4EE" stroke="none"/>
    <circle cx="121.24" cy="65" r="6" fill="#F5F4EE" stroke="none"/>
    <circle cx="0" cy="130" r="6" fill="#F5F4EE" stroke="none"/>
    <circle cx="-121.24" cy="65" r="6" fill="#F5F4EE" stroke="none"/>
    <circle cx="-121.24" cy="-65" r="6" fill="#F5F4EE" stroke="none"/>
    <circle cx="0" cy="0" r="10" fill="#B89870" stroke="none"/>
    <!-- 接続線 -->
    <line x1="0" y1="-130" x2="0" y2="0" stroke-opacity="0.45"/>
    <line x1="121.24" y1="-65" x2="0" y2="0" stroke-opacity="0.45"/>
    <line x1="121.24" y1="65" x2="0" y2="0" stroke-opacity="0.45"/>
    <line x1="0" y1="130" x2="0" y2="0" stroke-opacity="0.45"/>
    <line x1="-121.24" y1="65" x2="0" y2="0" stroke-opacity="0.45"/>
    <line x1="-121.24" y1="-65" x2="0" y2="0" stroke-opacity="0.45"/>
    <!-- 外周線 -->
    <line x1="0" y1="-130" x2="121.24" y2="-65" stroke-opacity="0.18"/>
    <line x1="121.24" y1="-65" x2="121.24" y2="65" stroke-opacity="0.18"/>
    <line x1="121.24" y1="65" x2="0" y2="130" stroke-opacity="0.18"/>
    <line x1="0" y1="130" x2="-121.24" y2="65" stroke-opacity="0.18"/>
    <line x1="-121.24" y1="65" x2="-121.24" y2="-65" stroke-opacity="0.18"/>
    <line x1="-121.24" y1="-65" x2="0" y2="-130" stroke-opacity="0.18"/>
  </g>

  <!-- 右側: タイトル + サブタイトル -->
  <text x="540" y="265"
        font-family="'Cormorant Garamond', 'EB Garamond', Georgia, serif"
        font-size="116" font-weight="500"
        letter-spacing="14"
        fill="#F5F4EE">AGORA</text>
  <line x1="540" y1="300" x2="900" y2="300" stroke="#B89870" stroke-width="1" opacity="0.7"/>
  <text x="540" y="350"
        font-family="'Inter', system-ui, sans-serif"
        font-size="28" font-weight="400"
        fill="#F5F4EE" opacity="0.85">
    The open database of the
  </text>
  <text x="540" y="390"
        font-family="'Inter', system-ui, sans-serif"
        font-size="28" font-weight="400"
        fill="#F5F4EE" opacity="0.85">
    world's communities.
  </text>
  <text x="540" y="475"
        font-family="'Inter', system-ui, sans-serif"
        font-size="20" font-weight="300"
        letter-spacing="3"
        fill="#B89870" opacity="0.8">
    STARK · TECHNOLOGIES
  </text>
</svg>
